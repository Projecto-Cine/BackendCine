spring.application.name=demo

# Server - Render asigna su propio puerto via $PORT
server.port=${PORT:8080}

# Database - apunta a TiDB Cloud via variables de entorno de Render
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:4000}/${DB_NAME:test}?sslMode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Email
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp-relay.brevo.com}
app.mail.from=${MAIL_FROM:equipo2lumencinema@gmail.com}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
